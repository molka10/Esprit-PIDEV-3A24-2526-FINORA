<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Find a Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map { height:100%; margin:0; }

        .btn {
            position:absolute; z-index:9999; top:14px; right:14px;
            background: rgba(255,255,255,0.85);
            border-radius: 14px;
            padding: 10px 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-family: system-ui, Arial;
            cursor:pointer;
            border: 1px solid rgba(124,58,237,0.18);
            backdrop-filter: blur(10px);
            user-select:none;
        }

        .leaflet-popup-content { font-family: system-ui, Arial; }
    </style>
</head>
<body>
<div id="map"></div>
<div class="btn" onclick="askLocation()">📍 Use my location</div>

<script>
    const map = L.map('map').setView([36.8065, 10.1815], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution:'© OpenStreetMap'
    }).addTo(map);

    let userMarker = null;
    let centerMarkers = [];

    const defaultIcon = L.icon({
        iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
        iconRetinaUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png",
        shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
        iconSize: [25,41],
        iconAnchor: [12,41]
    });

    const closestIcon = L.icon({
        iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-violet.png",
        shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
        iconSize: [25,41],
        iconAnchor: [12,41]
    });

    window.renderCenters = function(centers, closestId) {
        centerMarkers.forEach(m => map.removeLayer(m));
        centerMarkers = [];

        if (!centers || centers.length === 0) return;

        const group = [];

        centers.forEach(c => {
            const isClosest = (c.id === closestId);

            const marker = L.marker([c.lat, c.lng], { icon: isClosest ? closestIcon : defaultIcon })
                .addTo(map)
                .bindPopup(
                    (isClosest ? "⭐ <b>Closest Center</b><br/>" : "") +
                    "<b>" + (c.name||"") + "</b><br/>" +
                    (c.address||"")
                );

            centerMarkers.push(marker);
            group.push([c.lat, c.lng]);

            if (isClosest) marker.openPopup();
        });

        // zoom to show all markers (or keep current zoom if only 1)
        if (group.length > 1) map.fitBounds(group, { padding:[30,30] });
        else map.setView(group[0], 12);
    }

    // ✅ NOW this exists (your Java calls it)
    window.setUserLocation = function(lat, lng) {
        if (userMarker) map.removeLayer(userMarker);

        userMarker = L.circleMarker([lat, lng], { radius:8 })
            .addTo(map)
            .bindPopup("You are here")
            .openPopup();

        map.setView([lat, lng], 12);
    }

    window.askLocation = function() {
        if (!navigator.geolocation) {
            if (window.javaBridge) window.javaBridge.onGeoError("Geolocation not supported");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;

                setUserLocation(lat, lng);

                if (window.javaBridge) window.javaBridge.onGeo(lat, lng);
            },
            err => {
                if (window.javaBridge) window.javaBridge.onGeoError(err.message);
            },
            { enableHighAccuracy:true, timeout:8000 }
        );
    }
</script>
</body>
</html>
