# yaml-language-server: $schema=../vendor/symfony/routing/Loader/schema/routing.schema.json

# This file is the entry point to configure the routes of your app.
# Methods with the #[Route] attribute are automatically imported.
# See also https://symfony.com/doc/current/routing.html

# To list all registered routes, run the following command:
#   bin/console debug:router

controllers:
    resource: routing.controllers

add_transaction:
    path: /add
    controller: App\Controller\TransactionController::add

transactions:
    path: /transactions
    controller: App\Controller\TransactionController::index


dashboard:
    path: /dashboard
    controller: App\Controller\TransactionController::dashboard

edit:
    path: /edit/{id}
    controller: App\Controller\TransactionController::edit

delete:
    path: /delete/{id}
    controller: App\Controller\TransactionController::delete
